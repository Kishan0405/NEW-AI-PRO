name: ai_vision_pro
description: AI-powered assistive app for blind users with real-time object detection, OCR, and voice commands.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  tflite_flutter: ^0.12.1
  
  # Camera & Image Processing
  camera: ^0.12.0+1
  image: ^4.1.3
  
  # ML Kit
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_text_recognition: ^0.15.1
  
  # Text-to-Speech
  flutter_tts: ^4.2.5
  
  # Permissions
  permission_handler: ^12.0.1
  
  # Voice Recognition
  speech_to_text: ^7.3.0
  
  # State Management
  provider: ^6.0.5
  
  # Utilities
  vibration: ^3.1.8
  audioplayers: ^5.2.1
  
  # UI
  cupertino_icons: ^1.0.6
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/models/ # Create this folder and place your CNN model here (e.g., mobilenet_v2.tflite)
    - assets/models/labels.txt # Text file containing the labels for your CNN
